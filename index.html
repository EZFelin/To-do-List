<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>teste deploy</h1>
    </header>

    <section class="todo-card">
      <form id="todo-form">
        <input id="todo-input" type="text" placeholder="Digite uma tarefa" autocomplete="off" required>
        <button id="todo-button" type="submit"> + </button>
      </form>
    </section>

    <section class="todo-list">
      <h2>Minha Lista</h2>
      <form id="todo-list-form">
      </form>
      <p class="empty-list">Nenhuma tarefa adicionada.</p>
      <ul id="todo-list"></ul>
    </section>
    </main>
  <script src="script.js"></script>
</body>
</html>
